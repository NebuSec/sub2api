name: Deploy AWS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build and deploy. Defaults to the current commit SHA."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-aws-prod
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-1' }}
  ECR_REPOSITORY: ${{ vars.SUB2API_ECR_REPOSITORY || 'vega-sub2api' }}
  TERRAFORM_DIR: infra/terraform
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    name: Build, Push, and Apply Terraform
    runs-on: ubuntu-latest
    environment: prod
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success') }}
    env:
      AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_PROD_DEPLOY_ROLE_ARN' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Check required configuration
        run: |
          if [ -z "${AWS_DEPLOY_ROLE_ARN}" ]; then
            echo "Set repository variable AWS_PROD_DEPLOY_ROLE_ARN or secret AWS_DEPLOY_ROLE_ARN." >&2
            exit 2
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v3

      - name: Compute image metadata
        id: image
        run: |
          set -euo pipefail
          INPUT_TAG="${{ github.event.inputs.image_tag || '' }}"
          IMAGE_TAG="${INPUT_TAG:-${DEPLOY_SHA}}"
          IMAGE_TAG="${IMAGE_TAG:0:40}"
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Sub2API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image.outputs.uri }}
          build-args: |
            VERSION=${{ steps.image.outputs.tag }}
            COMMIT=${{ env.DEPLOY_SHA }}
            DATE=${{ steps.image.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -input=false

      - name: Terraform fmt check
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var "sub2api_image_tag=${{ steps.image.outputs.tag }}"

      - name: Terraform apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
